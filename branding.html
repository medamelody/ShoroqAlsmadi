<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branding Album</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="branding">
    <main class="section page-top">
      <div class="container">
        <h1 class="page-title">Branding</h1>
        <p class="page-note">Albums - Images</p>
        <p>
          Building memorable brands through clear positioning, visual identity,
          and meaningful customer experiences.
        </p>

        <div class="top-links">
          <a href="index.html" class="btn">Back to Main Page</a>
        </div>

        <div class="upload-block">
          <div class="upload-actions">
            <input
              id="upload-input"
              class="file-input"
              type="file"
              accept="image/*"
              multiple
            />
          </div>
          <div id="gallery" class="media-grid" aria-live="polite"></div>
        </div>
      </div>
    </main>

    <script src="media-pages.js"></script>
  </body>
</html>
